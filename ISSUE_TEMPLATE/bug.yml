name: "Bug Report"
description: "Report an issue"
labels: "bug"
projects: "HQ"
body:
  - type: textarea
    id: buggy-behaviour
    attributes:
      label: What happened?
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '.....'
        4. See error......
    validations:
      required: true
  - type: textarea
    id: extras
    attributes:
      label: Anything else?
      description: |
        Screenshots? Operating System? Version?
        Please include the client log (in your Robocraft folder, `outputLog#.txt` where `#` is a digit 0 through 9).
        If you have access to the server logs, please also include any relevant service logs.

        Tip: You can attach files by clicking this area to highlight it and then dragging the files in.
    validations:
      required: false
