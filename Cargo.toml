[package]
name = "servers"
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    "auth",
    "polariton_auth",
    "rc_services", "rc_services_room",
    "rc_static_data", "rc_microtransactions",
    "rc_social", "rc_social_room",
    "rc_chat", "rc_chat_room"
]

[workspace.dependencies]
rocket = { version = "0.5.1", features = [ "json" ] }
libfj = { version = "0.7.5", path = "../libfj" }
log = "0.4"
env_logger = "0.11"
clap = { version = "4.5", features = [ "derive" ] }
polariton = { version = "0.1", path = "../polariton" }
polariton_server = { version = "0.1", path = "../polariton/server" }
